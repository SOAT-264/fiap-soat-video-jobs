name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            fastapi \
            sqlalchemy \
            redis \
            aioboto3 \
            pydantic-settings \
            uvicorn \
            httpx \
            asyncpg

      - name: Run tests with coverage gate
        run: python -m pytest
