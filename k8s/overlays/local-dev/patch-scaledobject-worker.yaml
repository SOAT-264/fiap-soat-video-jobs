apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: job-worker-sqs-scaler
  namespace: video-processor
spec:
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: job-worker-sqs-auth
      metadata:
        queueURLFromEnv: SQS_JOB_QUEUE_URL
        queueLength: "3"
        awsRegion: "us-east-1"
        awsEndpoint: "http://host.docker.internal:4566"
        scaleOnInFlight: "true"
